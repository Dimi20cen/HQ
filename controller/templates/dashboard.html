<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Utility Controller</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="shortcut icon" href="/static/favicon.png">
    <link rel="apple-touch-icon" href="/static/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/dashboard.css" />
</head>
<body>

<header id="cmd-strip" class="cmd-strip" role="banner">
    <div class="cmd-strip-left">
        <div class="apps-menu-btn" aria-hidden="true">
            <img class="apps-menu-logo" src="/static/logo.png" alt="" aria-hidden="true">
        </div>
    </div>

    <div class="cmd-strip-center">
        <div class="cmd-strip-tools">
            <button id="pill-tools" class="cmd-pill cmd-pill-action" type="button" aria-label="Open tools menu" aria-expanded="false" aria-controls="hidden-tools-menu">
                <span class="cmd-pill-count" id="pill-tools-count">—</span>
                <span class="cmd-pill-label">Tools</span>
            </button>
            <div id="hidden-tools-menu" class="hidden-tools-menu" hidden></div>
        </div>
        <button id="pill-projects" class="cmd-pill cmd-pill-action" type="button" aria-label="Open projects panel" aria-expanded="false" aria-controls="panel-projects">
            <span class="cmd-pill-count" id="pill-projects-count">—</span>
            <span class="cmd-pill-label">Projects</span>
        </button>
        <button id="pill-hosts" class="cmd-pill cmd-pill-action" type="button" aria-label="Open hosts panel" aria-expanded="false" aria-controls="panel-hosts">
            <span class="cmd-pill-count" id="pill-hosts-count">—</span>
            <span class="cmd-pill-label">Hosts</span>
        </button>
    </div>

    <div class="cmd-strip-right">
        <button id="reorder-mode-btn" class="reorder-mode-btn" type="button" aria-label="Open reorder mode" aria-expanded="false">
            Reorder
        </button>
        <a
            class="auth-link-btn"
            href="https://auth.dimy.dev"
            target="_blank"
            rel="noreferrer"
            aria-label="Open auth service"
        >Auth</a>
        <div id="reorder-panel" class="reorder-panel" hidden></div>
    </div>
</header>

<div id="panel-backdrop" class="panel-backdrop" aria-hidden="true"></div>

<aside id="panel-projects" class="side-panel" aria-label="Projects panel" aria-hidden="true" aria-modal="true" tabindex="-1" hidden inert>
    <div class="side-panel-inner">
        <div class="side-panel-header">
            <div class="side-panel-title-row">
                <div>
                    <p class="projects-board-kicker">Projects</p>
                </div>
                <button id="panel-projects-close" class="side-panel-close" type="button" aria-label="Close projects panel">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 6 6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="side-panel-actions">
                <button id="project-add-btn" class="projects-board-btn" type="button">New Project</button>
                <button id="project-export-btn" class="projects-board-btn projects-board-btn-primary" type="button">Export Catalog</button>
                <button id="project-publish-btn" class="projects-board-btn projects-board-btn-primary" type="button">Publish Portfolio</button>
            </div>
            <div id="projects-feedback" class="projects-feedback" aria-live="polite"></div>
            <div id="projects-result" class="projects-result" hidden></div>
        </div>
        <div class="side-panel-body">
            <div id="projects-empty" class="projects-empty" hidden>No projects yet.</div>
            <div id="projects-list" class="projects-list"></div>
        </div>
    </div>
</aside>

<aside id="panel-hosts" class="side-panel" aria-label="Hosts panel" aria-hidden="true" aria-modal="true" tabindex="-1" hidden inert>
    <div class="side-panel-inner">
        <div class="side-panel-header">
            <div class="side-panel-title-row">
                <div>
                    <p class="projects-board-kicker">Hosts</p>
                    <h2 class="side-panel-title">Runner Status</h2>
                </div>
                <button id="panel-hosts-close" class="side-panel-close" type="button" aria-label="Close hosts panel">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 6 6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div id="hosts-feedback" class="projects-feedback" aria-live="polite"></div>
        </div>
        <div class="side-panel-body">
            <div id="hosts-empty" class="projects-empty" hidden>No hosts configured yet.</div>
            <div id="hosts-list" class="hosts-list"></div>
        </div>
    </div>
</aside>

<main id="main-stage" class="main-stage">
    <div id="tools-container" class="grid-container"></div>
</main>

<script src="/static/dashboard.js"></script>
</body>
</html>
