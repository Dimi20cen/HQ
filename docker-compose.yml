services:
  hq:
    build: .
    container_name: hq
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CONTROLLER_HOST: 0.0.0.0
      CONTROLLER_PORT: "8000"
      CONTROLLER_DB_PATH: /app/runtime/controller/tools.db
      CALENDAR_DB_PATH: /app/runtime/tools/calendar/calendar.db
      JOBBER_DB_PATH: /app/runtime/tools/jobber/jobs.db
      HQ_ACTION_RUNNER_URL: ${HQ_ACTION_RUNNER_URL:-}
      HQ_ACTION_RUNNER_SOCKET_PATH: ${HQ_ACTION_RUNNER_SOCKET_PATH:-/app/runtime/action-runner.sock}
      HQ_ACTION_RUNNER_TOKEN: ${HQ_ACTION_RUNNER_TOKEN:-}
      HQ_PORTFOLIO_REPO_DIR: ${HQ_PORTFOLIO_REPO_DIR:-/portfolio-repo}
      HQ_PORTFOLIO_EXPORT_PATH: ${HQ_PORTFOLIO_EXPORT_PATH:-}
      HQ_PORTFOLIO_BRANCH: ${HQ_PORTFOLIO_BRANCH:-main}
    ports:
      - "${LAN_BIND_IP:-192.168.1.119}:${LAN_BIND_PORT:-8000}:8000"
    command: >
      sh -c "mkdir -p /app/runtime/controller /app/runtime/tools /app/logs
      && python -m uvicorn controller.controller_main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./runtime:/app/runtime
      - ./logs:/app/logs
      - ${HQ_PORTFOLIO_REPO_HOST_DIR:-./runtime/portfolio-repo}:/portfolio-repo
